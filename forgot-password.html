<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — PodCraft AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer; justify-content:center; display:flex; margin-bottom:1.5rem;">
          <div class="logo-icon">🎙️</div>
          <h1>PodCraft AI</h1>
        </div>
        <h2>Reset Password</h2>
        <p>Enter your email and we'll send you a reset link</p>
      </div>

      <form id="forgot-form" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <button type="submit" class="btn-primary btn-block">
          Send Reset Link
        </button>
      </form>

      <div class="auth-footer">
        <p><a href="signin.html">← Back to Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script>
    const form = document.getElementById('forgot-form');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      
      if (!email) {
        showToast('Please enter your email', 'warning');
        return;
      }
      
      const btn = form.querySelector('button');
      btn.textContent = 'Sending...';
      btn.disabled = true;
      
      try {
        // Supabase هيرسل إيميل فيه رابط إعادة تعيين كلمة المرور
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: `${window.location.origin}/reset-password.html`
        });
        
        if (error) throw error;
        
        showToast('Reset link sent! Check your email (including spam)', 'success');
        setTimeout(() => {
          window.location.href = 'signin.html';
        }, 3000);
        
      } catch (err) {
        console.error('Error:', err);
        showToast(err.message || 'Something went wrong', 'error');
        btn.textContent = 'Send Reset Link';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
