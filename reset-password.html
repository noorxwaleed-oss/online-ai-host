<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — PodCraft AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer; justify-content:center; display:flex; margin-bottom:1.5rem;">
          <div class="logo-icon">🎙️</div>
          <h1>PodCraft AI</h1>
        </div>
        <h2>Create New Password</h2>
        <p>Enter your new password below</p>
      </div>

      <form id="reset-form" class="auth-form">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" placeholder="Enter new password" required>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Confirm new password" required>
        </div>

        <button type="submit" class="btn-primary btn-block">
          Update Password
        </button>
      </form>

      <div class="auth-footer">
        <p><a href="signin.html">← Back to Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script>
    const form = document.getElementById('reset-form');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      
      if (password !== confirm) {
        showToast('Passwords do not match', 'error');
        return;
      }
      
      if (password.length < 6) {
        showToast('Password must be at least 6 characters', 'warning');
        return;
      }
      
      const btn = form.querySelector('button');
      btn.textContent = 'Updating...';
      btn.disabled = true;
      
      try {
        // تحديث كلمة المرور
        const { error } = await supabase.auth.updateUser({ password: password });
        
        if (error) throw error;
        
        showToast('Password updated successfully!', 'success');
        
        // تسجيل الخروج
        await supabase.auth.signOut();
        
        setTimeout(() => {
          window.location.href = 'signin.html';
        }, 2000);
        
      } catch (err) {
        console.error('Error:', err);
        showToast(err.message || 'Could not update password', 'error');
        btn.textContent = 'Update Password';
        btn.disabled = false;
      }
    });
    
    // التحقق من أن المستخدم جا من رابط إعادة التعيين
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        showToast('Invalid or expired reset link. Please request a new one.', 'warning');
        setTimeout(() => {
          window.location.href = 'forgot-password.html';
        }, 2000);
      }
    })();
  </script>
</body>
</html>
