<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — PodCraft AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <!-- Decorative orbs -->
  <div style="position:fixed;top:-100px;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(147,51,234,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>
  <div style="position:fixed;bottom:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(236,72,153,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>

  <div class="auth-container" style="position:relative;z-index:1;">
    <div class="auth-card">

      <div class="auth-header">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer; justify-content:center; display:flex; margin-bottom:1.5rem;">
          <div class="logo-icon">🎙️</div>
          <h1>PodCraft AI</h1>
        </div>
        <h2>Welcome back</h2>
        <p>Sign in to continue creating amazing podcasts</p>
      </div>

      <!-- Social login -->
      <div class="social-auth" style="margin-bottom:1.5rem;">
        <button id="google-signin" class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
        <button id="github-signin" class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.21.68-.48 0-.24-.01-.88-.01-1.73-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85 0 1.34-.01 2.42-.01 2.75 0 .27.18.58.69.48C19.13 20.17 22 16.42 22 12c0-5.52-4.48-10-10-10z"/>
          </svg>
          Continue with GitHub
        </button>
      </div>

      <div class="auth-divider">
        <span>or sign in with email</span>
      </div>

      <form id="signin-form" class="auth-form" style="margin-top:1.5rem;" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
            <button type="button" id="toggle-password" class="toggle-password"></button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary btn-block" style="padding:0.9rem; margin-top:0.5rem; font-size:0.95rem; border-radius:14px;">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Create one free</a></p>
      </div>

    </div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
