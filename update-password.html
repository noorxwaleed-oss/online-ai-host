<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password — PodCraft AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <div style="position:fixed;top:-100px;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(147,51,234,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>
  <div style="position:fixed;bottom:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(236,72,153,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>

  <div class="auth-container" style="position:relative;z-index:1;">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer; justify-content:center; display:flex; margin-bottom:1.5rem;">
          <div class="logo-icon">🎙️</div>
          <h1>PodCraft AI</h1>
        </div>
        <h2>Create New Password</h2>
        <p>Enter your new password below. It will be updated immediately.</p>
      </div>

      <form id="update-form" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required readonly style="background: rgba(255,255,255,0.02);">
        </div>

        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter new password" required>
            <button type="button" id="toggle-password" class="toggle-password"></button>
          </div>
          <div class="password-strength">
            <div class="strength-bar">
              <div id="strength-bar-fill" class="strength-bar-fill"></div>
            </div>
            <div id="strength-text" class="strength-text"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" placeholder="Confirm new password" required>
            <button type="button" id="toggle-confirm" class="toggle-password"></button>
          </div>
        </div>

        <button type="submit" class="btn-primary btn-block">Update Password</button>
      </form>

      <div class="auth-footer" style="margin-top: 1.5rem;">
        <p><a href="signin.html">← Back to Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script>
    // جلب الإيميل من URL
    const urlParams = new URLSearchParams(window.location.search);
    let email = urlParams.get('email');
    
    const emailInput = document.getElementById('email');
    if (emailInput && email) {
      emailInput.value = email;
    }
    
    // التحقق من أن المستخدم مر بخطوة التحقق
    const verifiedData = localStorage.getItem('reset_verified');
    if (!verifiedData && !email) {
      showToast('Please verify your email first.', 'warning');
      setTimeout(() => {
        window.location.href = 'forgot-password.html';
      }, 2000);
    } else if (verifiedData) {
      const { email: verifiedEmail, verifiedAt } = JSON.parse(verifiedData);
      // التحقق من أن التحقق تم خلال آخر 15 دقيقة
      if (Date.now() - verifiedAt > 15 * 60 * 1000) {
        showToast('Verification expired. Please request a new code.', 'warning');
        localStorage.removeItem('reset_verified');
        setTimeout(() => {
          window.location.href = 'forgot-password.html';
        }, 2000);
      }
    }
    
    // Password strength check
    function checkPasswordStrength(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[a-z]/.test(password)) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^a-zA-Z0-9]/.test(password)) score++;
      
      const capped = Math.min(score, 5);
      const messages = ['', 'Too weak', 'Weak', 'Fair', 'Strong', 'Very strong!'];
      const percent = (capped / 5) * 100;
      let color = '#ef4444';
      if (percent >= 40) color = '#f59e0b';
      if (percent >= 70) color = '#22c55e';
      
      return { strength: capped, message: messages[capped] || '', percent, color };
    }
    
    const passwordInput = document.getElementById('password');
    if (passwordInput) {
      passwordInput.addEventListener('input', (e) => {
        const { percent, message, color } = checkPasswordStrength(e.target.value);
        const bar = document.getElementById('strength-bar-fill');
        const text = document.getElementById('strength-text');
        
        if (bar) {
          bar.style.width = `${percent}%`;
          bar.style.background = color;
        }
        if (text) text.textContent = message;
      });
    }
    
    function setupToggle(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      if (!input || !btn) return;
      
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      
      btn.addEventListener('click', () => {
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.innerHTML = isPassword ? 
          `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>` :
          `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      });
    }
    
    setupToggle('password', 'toggle-password');
    setupToggle('confirm-password', 'toggle-confirm');
    
    const updateForm = document.getElementById('update-form');
    
    updateForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      
      if (password !== confirm) {
        showToast('Passwords do not match.', 'error');
        return;
      }
      
      if (password.length < 6) {
        showToast('Password must be at least 6 characters.', 'warning');
        return;
      }
      
      const hasNumber = /[0-9]/.test(password);
      const hasLetter = /[a-zA-Z]/.test(password);
      if (!hasNumber || !hasLetter) {
        showToast('Password must contain both letters and numbers.', 'warning');
        return;
      }
      
      const submitBtn = updateForm.querySelector('[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Updating...';
      submitBtn.disabled = true;
      
      try {
        // أولاً: تسجيل الدخول باستخدام البريد الإلكتروني وكلمة المرور المؤقتة؟
        // لا يمكننا تسجيل الدخول لأننا لا نعرف كلمة المرور القديمة
        
        // الطريقة الصحيحة: استخدام resetPasswordForEmail لإرسال رابط إعادة تعيين كلمة المرور
        // ولكن هذا سيرسل إيميل من Supabase
        
        // بدلاً من ذلك، نحاول تحديث كلمة المرور باستخدام admin API
        // ولكن هذا يتطلب Service Role Key (ليس آمناً في المقدمة)
        
        // الحل: استخدام Supabase Auth API لتحديث كلمة المرور بعد تسجيل الدخول
        // بما أن المستخدم ليس مسجلاً دخوله حالياً، نحتاج إلى طريقة أخرى
        
        // الحل الأمثل: استخدام طريقة Supabase المدمجة لإعادة تعيين كلمة المرور
        const { error: resetError } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: `${window.location.origin}/update-password-callback.html`
        });
        
        if (resetError) throw resetError;
        
        showToast('Password reset link sent to your email. Please check your inbox.', 'success');
        
        // حذف بيانات التحقق المؤقتة
        localStorage.removeItem('reset_otp');
        localStorage.removeItem('reset_verified');
        
        setTimeout(() => {
          window.location.href = 'signin.html';
        }, 3000);
        
      } catch (err) {
        console.error('Update error:', err);
        showToast(err.message || 'Could not update password. Please try again.', 'error');
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
